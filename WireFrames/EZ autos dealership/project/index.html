<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZ Autos - Find Your Perfect Drive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>

<!-- CleverCompanion Widget Container -->
<div id="clevercompanion-container"></div>

<script type="module" src="/src/main.tsx"></script>

<!-- CleverCompanion Widget Script -->
<script src="http://localhost:3000/clevercompanion-widget.js"></script>

<script>
  // Global helper functions for CleverCompanion compatibility
  window.startChat = function() {
    console.log('startChat called');
    if (window.CleverCompanionWidget) {
      console.log('Opening widget via startChat');
      window.CleverCompanionWidget.open();
    } else {
      console.log('CleverCompanion Widget not available in startChat');
    }
  };

  window.testMessage = function(message) {
    console.log('testMessage called with:', message);
    if (window.CleverCompanionWidget) {
      window.CleverCompanionWidget.open();
      setTimeout(() => {
        if (window.CleverCompanionWidget.sendMessage) {
          window.CleverCompanionWidget.sendMessage(message);
        }
      }, 500);
    } else {
      console.log('CleverCompanion Widget not available in testMessage');
    }
  };

  window.quickAction = function(action) {
    console.log('quickAction called with:', action);
    if (window.CleverCompanionWidget) {
      window.CleverCompanionWidget.open();
      // Don't send a preset message, just open the chat
    } else {
      console.log('CleverCompanion Widget not available in quickAction');
    }
  };

  // Check widget status when page loads
  document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM loaded, checking for CleverCompanion widget...');

    // Check immediately
    if (window.CleverCompanionWidget) {
      console.log('✅ CleverCompanion Widget available immediately');
    } else {
      console.log('⏳ Waiting for CleverCompanion Widget to load...');

      // Check periodically
      let attempts = 0;
      const maxAttempts = 50; // 5 seconds
      const checkInterval = setInterval(() => {
        attempts++;
        if (window.CleverCompanionWidget) {
          console.log('✅ CleverCompanion Widget loaded successfully!');
          clearInterval(checkInterval);
        } else if (attempts >= maxAttempts) {
          console.log('❌ Widget not loaded after timeout. Make sure CleverCompanion service is running on http://localhost:3000');
          clearInterval(checkInterval);
        }
      }, 100);
    }
  });
</script>
</body>
</html>
