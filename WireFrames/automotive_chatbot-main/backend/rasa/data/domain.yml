version: "3.1"

intents:
  - greet
  - goodbye
  - help
  - about_car
  - schedule_test_drive
  - ask_price
  - maintenance_info
  - affirm
  - deny
  - out_of_scope

responses:
  utter_greet:
    - text: "Hello! How can I help you today?"
  utter_goodbye:
    - text: "Goodbye! Have a great day!"
  utter_help:
    - text: "I can help you with information about our cars, schedule test drives, and answer maintenance questions."
  utter_about_car:
    - text: "We have a wide range of vehicles. What specific information are you looking for?"
  utter_schedule_test_drive:
    - text: "I can help you schedule a test drive. What model are you interested in?"
  utter_ask_price:
    - text: "I can provide pricing information. Which model would you like to know about?"
  utter_maintenance_info:
    - text: "I can help with maintenance information. What would you like to know?"
  utter_out_of_scope:
    - text: "I'm sorry, I don't understand that. Could you rephrase or ask something else?"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true 