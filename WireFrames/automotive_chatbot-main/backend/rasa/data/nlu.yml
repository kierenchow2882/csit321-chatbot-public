version: "3.1"

nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - hello there
    - good morning
    - good evening
    - hey there

- intent: goodbye
  examples: |
    - bye
    - goodbye
    - see you around
    - see you later
    - good night

- intent: help
  examples: |
    - help
    - I need help
    - what can you do
    - how can you help me
    - what are your features

- intent: about_car
  examples: |
    - tell me about your cars
    - what cars do you have
    - what models are available
    - show me your vehicles
    - what types of cars do you sell

- intent: schedule_test_drive
  examples: |
    - I want to test drive
    - can I schedule a test drive
    - I'd like to test a car
    - how do I book a test drive
    - arrange a test drive

- intent: ask_price
  examples: |
    - how much does it cost
    - what's the price
    - tell me the price
    - how much is it
    - what's the cost

- intent: maintenance_info
  examples: |
    - when should I service my car
    - maintenance schedule
    - service intervals
    - how often should I service
    - maintenance requirements

- intent: affirm
  examples: |
    - yes
    - y
    - indeed
    - of course
    - that sounds good
    - correct

- intent: deny
  examples: |
    - no
    - n
    - never
    - I don't think so
    - don't like that
    - no way
    - not really

- intent: out_of_scope
  examples: |
    - I want to order a pizza
    - book a flight
    - what's the weather like
    - tell me a joke
    - play music 