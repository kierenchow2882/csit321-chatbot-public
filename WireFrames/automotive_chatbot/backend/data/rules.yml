version: "3.1"

rules:

- rule: Greet user
  steps:
  - intent: greet
  - action: utter_greet

- rule: Say goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Provide COE prices
  steps:
  - intent: ask_coe_prices
  - action: action_get_coe_prices

- rule: Provide vehicle information
  steps:
  - intent: ask_vehicle_info
  - action: action_get_vehicle_info

- rule: Provide pricing information
  steps:
  - intent: ask_pricing
  - action: utter_pricing

- rule: Handle test drive booking
  steps:
  - intent: book_test_drive
  - action: action_book_test_drive

- rule: Provide maintenance information
  steps:
  - intent: ask_maintenance
  - action: utter_maintenance

- rule: Provide registration information
  steps:
  - intent: ask_registration
  - action: utter_registration

- rule: Show features
  steps:
  - intent: ask_features
  - action: utter_features

- rule: Handle out of scope
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope
