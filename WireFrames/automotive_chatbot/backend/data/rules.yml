version: "3.1"

rules:

- rule: Greet user
  steps:
  - intent: greet
  - action: utter_greet

- rule: Say goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Provide COE prices
  steps:
  - intent: ask_coe_prices
  - action: action_coe_prices

- rule: Provide vehicle information
  steps:
  - intent: ask_vehicle_info
  - action: action_get_vehicle_info

- rule: Provide pricing information
  steps:
  - intent: ask_pricing
  - action: action_vehicle_pricing

- rule: Handle test drive booking
  steps:
  - intent: book_test_drive
  - action: action_book_test_drive

- rule: Provide maintenance information
  steps:
  - intent: ask_maintenance
  - action: action_get_maintenance_info

- rule: Provide registration information
  steps:
  - intent: ask_registration
  - action: utter_registration

- rule: Show features
  steps:
  - intent: ask_features
  - action: utter_features

- rule: Provide contact information
  steps:
  - intent: ask_contact
  - action: action_contact_us

- rule: Handle out of scope
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope

- rule: Handle affirmation
  steps:
  - intent: affirm
  - action: utter_greet

- rule: Handle denial
  steps:
  - intent: deny
  - action: utter_features

- rule: Fallback for unknown intents
  condition:
  - active_loop: null
  steps:
  - intent: nlu_fallback
  - action: utter_default
