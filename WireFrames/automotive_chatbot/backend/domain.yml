responses:
  utter_greet:
  - text: "👋 Hi there! I'm CleverCompanion, your Singapore automotive assistant. I can help you with COE prices, vehicle information, test drives, maintenance, and financing. What would you like to know?"

  utter_goodbye:
  - text: "Thank you for using CleverCompanion! Have a great day! 🚗"

  utter_default:
  - text: "I'm sorry, I didn't understand that. I specialize in Singapore automotive services like COE prices, vehicle information, test drives, and maintenance. How can I help you with your automotive needs?"

  utter_out_of_scope:
  - text: "I focus on automotive services in Singapore. Please ask about vehicles, COE prices, test drives, financing, or maintenance. What can I help you with?"

  utter_pricing:
  - text: "I can help you with vehicle pricing information. Let me get the latest pricing details for you."

  utter_maintenance:
  - text: "🔧 **Comprehensive Car Maintenance Guide**\n\n**📅 Regular Service Schedule:**\n• **Every 5,000km**: Oil & filter change\n• **Every 10,000km**: Full service inspection\n• **Every 20,000km**: Major service (spark plugs, air filter)\n• **Every 40,000km**: Transmission fluid, brake fluid\n\n**🛞 Essential Checks:**\n• **Tire pressure**: Monthly check\n• **Tire rotation**: Every 10,000km\n• **Brake pads**: Inspect every 20,000km\n• **Battery**: Check terminals every 6 months\n\n**💰 Cost Estimates:**\n• Basic service: $150-300\n• Major service: $400-800\n• Tire replacement: $400-1200 (set of 4)\n\n**⚠️ Warning Signs:**\n• Strange noises or vibrations\n• Dashboard warning lights\n• Unusual smells or smoke\n• Poor fuel efficiency\n\n**💡 Money-Saving Tips:**\n• Use authorized workshops for warranty\n• Keep maintenance records for resale value\n• Address issues early to prevent costly repairs\n• Consider workshop packages for regular servicing\n\nWhat specific maintenance help do you need?"

  utter_registration:
  - text: "👋 Hi there! I'm CleverCompanion, your Singapore automotive assistant.\n\n📋 **Vehicle Registration Process (LTA)**\n\n**📑 Required Documents:**\n• NRIC/Passport (Original + Copy)\n• Valid Driving License\n• Motor Insurance Certificate\n• Vehicle Inspection Certificate\n• COE Certificate\n• Purchase Invoice/Agreement\n\n**💰 Registration Fees (2024):**\n• Registration Fee: $140\n• Number Plate Fee: $50\n• Road Tax: Varies by engine capacity\n• Additional Registration Fee (ARF): 100% of OMV\n\n**🏢 Where to Register:**\n• LTA Customer Service Centres\n• Authorized dealers (recommended)\n• SingPost branches (limited services)\n\n**⏰ Process Timeline:**\n• Same day registration (if documents complete)\n• Temporary number plates issued immediately\n• Permanent plates ready in 5-7 working days\n\n**🌐 Online Services:**\n• Check registration status: lta.gov.sg\n• Pay road tax online\n• Update particulars\n\n**📞 LTA Hotline:** 6898 0000\n\nNeed help with any specific step?"

  utter_features:
  - text: "I can assist you with vehicle information, pricing, test drives, and maintenance guidance. Use the buttons below for quick access to these services."



