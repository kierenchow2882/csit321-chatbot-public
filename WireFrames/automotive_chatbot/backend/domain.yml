version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - ask_coe_prices
  - ask_vehicle_info
  - ask_pricing
  - book_test_drive
  - ask_maintenance
  - ask_registration
  - ask_features
  - out_of_scope

entities:
  - car_brand
  - car_model

responses:
  utter_greet:
  - text: "👋 Hi! I'm CleverCompanion, your intelligent assistant. How can I help you today?"

  utter_goodbye:
  - text: "Thank you for using CleverCompanion! Have a great day! 🚗"



  utter_pricing:
  - text: "I can help you with vehicle pricing. Please specify the car model you're interested in for accurate pricing information."



  utter_maintenance:
  - text: "🔧 **Comprehensive Car Maintenance Guide**\n\n**📅 Regular Service Schedule:**\n• **Every 5,000km**: Oil & filter change\n• **Every 10,000km**: Full service inspection\n• **Every 20,000km**: Major service (spark plugs, air filter)\n• **Every 40,000km**: Transmission fluid, brake fluid\n\n**🛞 Essential Checks:**\n• **Tire pressure**: Monthly check\n• **Tire rotation**: Every 10,000km\n• **Brake pads**: Inspect every 20,000km\n• **Battery**: Check terminals every 6 months\n\n**💰 Cost Estimates (Singapore):**\n• Basic service: $150-300\n• Major service: $400-800\n• Tire replacement: $400-1200 (set of 4)\n\n**⚠️ Warning Signs:**\n• Strange noises or vibrations\n• Dashboard warning lights\n• Unusual smells or smoke\n• Poor fuel efficiency\n\n**💡 Money-Saving Tips:**\n• Use authorized workshops for warranty\n• Keep maintenance records for resale value\n• Address issues early to prevent costly repairs\n• Consider workshop packages for regular servicing\n\nWhat specific maintenance help do you need?"

  utter_registration:
  - text: "For vehicle registration, you'll need:\n\n📋 **Documents**: IC, Insurance, Inspection Certificate\n💰 **Fees**: Registration fee + COE + Additional charges\n⏰ **Process**: Visit LTA or authorized dealer\n\nNeed help with any specific step?"

  utter_features:
  - text: "I can assist you with vehicle information, pricing, test drives, and maintenance guidance. Use the buttons below for quick access to these services."

  utter_out_of_scope:
  - text: "I specialize in automotive services. Please ask about vehicles, pricing, test drives, or maintenance. How can I help with your automotive needs?"

  utter_default:
  - text: "I didn't quite understand that. Could you please rephrase your question about vehicles, pricing, or services?"

actions:
  - action_get_coe_prices
  - action_get_vehicle_info
  - action_book_test_drive
  - action_get_maintenance_info
  - utter_greet
  - utter_goodbye
  - utter_pricing
  - utter_maintenance
  - utter_registration
  - utter_features
  - utter_out_of_scope
  - utter_default

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
