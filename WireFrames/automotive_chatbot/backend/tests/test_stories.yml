#### This file contains tests to evaluate that your bot behaves as expected.
#### If you want to learn more, please see the docs: https://rasa.com/docs/rasa/testing-your-assistant

stories:
# ========== GREETING & BASIC INTERACTIONS ==========
- story: Basic greeting flow
  steps:
  - user: |
      hello there!
    intent: greet
  - action: utter_greet
  - user: |
      amazing
    intent: mood_great
  - action: utter_happy

- story: Greeting with goodbye
  steps:
  - user: |
      hello
    intent: greet
  - action: utter_greet
  - user: |
      bye-bye!
    intent: goodbye
  - action: utter_goodbye

# ========== AUTOMOTIVE SPECIFIC TESTS ==========
- story: Vehicle information inquiry
  steps:
  - user: |
      tell me about Toyota Camry
    intent: ask_vehicle_info
  - action: action_get_vehicle_info
  - user: |
      what's the price?
    intent: ask_pricing
  - action: action_get_pricing

- story: COE price inquiry
  steps:
  - user: |
      what are the current COE prices?
    intent: ask_coe_prices
  - action: action_get_coe_prices
  - user: |
      explain COE categories
    intent: ask_coe_categories
  - action: action_explain_coe_categories

- story: Test drive booking flow
  steps:
  - user: |
      I want to book a test drive for BMW 3 Series
    intent: book_test_drive
  - action: action_book_test_drive
  - user: |
      when are you open?
    intent: ask_business_hours
  - action: action_provide_business_hours

- story: Loan calculation inquiry
  steps:
  - user: |
      calculate loan for $80000 car
    intent: ask_loan_calculation
  - action: action_calculate_loan
  - user: |
      tell me about loan options
    intent: ask_loan_info
  - action: action_get_loan_info

- story: Maintenance information
  steps:
  - user: |
      what maintenance is required for Honda Civic?
    intent: ask_maintenance
  - action: action_get_maintenance_info
  - user: |
      how much does maintenance cost?
    intent: ask_maintenance_costs
  - action: action_get_maintenance_costs

# ========== CONTACT & SUPPORT ==========
- story: Contact information request
  steps:
  - user: |
      how can I contact you?
    intent: ask_contact
  - action: action_contact_us

- story: Help request
  steps:
  - user: |
      I need help
    intent: ask_for_help
  - action: action_provide_help

# ========== ERROR HANDLING ==========
- story: Out of scope handling
  steps:
  - user: |
      what's the weather today?
    intent: out_of_scope
  - action: utter_out_of_scope

- story: Fallback handling
  steps:
  - user: |
      asdfghjkl random text
    intent: nlu_fallback
  - action: utter_default

# ========== COMPLEX CONVERSATION FLOWS ==========
- story: Multi-step vehicle purchase inquiry
  steps:
  - user: |
      hello
    intent: greet
  - action: utter_greet
  - user: |
      I'm looking for a family car
    intent: ask_vehicle_info
  - action: action_get_vehicle_info
  - user: |
      what about Toyota Alphard?
    intent: ask_vehicle_info
  - action: action_get_vehicle_info
  - user: |
      show me the price
    intent: ask_pricing
  - action: action_get_pricing
  - user: |
      I want to book a test drive
    intent: book_test_drive
  - action: action_book_test_drive
  - user: |
      thanks, goodbye
    intent: goodbye
  - action: utter_goodbye
