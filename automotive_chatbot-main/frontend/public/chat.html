<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleverCompanion Chatbot Widget</title>
    <style>
        /* Chat Widget Styles */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segue UI', Roboto, sans-serif;
            z-index: 10000;
            transition: all 0.3s ease;
        }

        .chat-widget.minimized {
            height: 60px;
            width: 60px;
            border-radius: 50%;
            cursor: pointer;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-weight: 600;
            font-size: 16px;
        }

        .minimize-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }

        .minimize-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: #f1f3f4;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .message-button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .message-button:hover {
            background: #5a6fd8;
        }

        .chat-input-container {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #5a6fd8;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            color: #666;
            font-style: italic;
        }

        .chat-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 10001;
            display: none;
        }

        .chat-toggle:hover {
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .chat-widget {
                width: 100vw;
                height: 100vh;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Chat Toggle Button -->
    <button class="chat-toggle" id="chatToggle">💬</button>

    <!-- Chat Widget -->
    <div class="chat-widget" id="chatWidget">
        <div class="chat-header">
            <div class="chat-title">🤖 CleverCompanion</div>
            <button class="minimize-btn" id="minimizeBtn">−</button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                👋 Hi! I'm CleverCompanion, your intelligent assistant. How can I help you today?
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            Assistant is typing...
        </div>
        
        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="Type your message..."
                maxlength="500"
            >
            <button class="send-btn" id="sendBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        class CleverCompanionWidget {
            constructor() {
                // Try Rasa first, then fallback to backend API
                this.rasaUrl = 'http://localhost:5005/webhooks/rest/webhook';
                this.backendUrl = 'http://localhost:8000/api/chatbots/chat';
                this.isMinimized = false;
                this.isTyping = false;
                this.sessionId = this.generateSessionId();
                
                this.initializeElements();
                this.attachEventListeners();
            }

            initializeElements() {
                this.chatWidget = document.getElementById('chatWidget');
                this.chatToggle = document.getElementById('chatToggle');
                this.minimizeBtn = document.getElementById('minimizeBtn');
                this.chatMessages = document.getElementById('chatMessages');
                this.chatInput = document.getElementById('chatInput');
                this.sendBtn = document.getElementById('sendBtn');
                this.typingIndicator = document.getElementById('typingIndicator');
            }

            attachEventListeners() {
                // Toggle chat
                this.chatToggle.addEventListener('click', () => this.toggleChat());
                this.minimizeBtn.addEventListener('click', () => this.minimizeChat());

                // Send message
                this.sendBtn.addEventListener('click', () => this.sendMessage());
                this.chatInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });

                // Auto-resize input
                this.chatInput.addEventListener('input', () => {
                    this.sendBtn.disabled = !this.chatInput.value.trim();
                });
            }

            toggleChat() {
                this.isMinimized = !this.isMinimized;
                if (this.isMinimized) {
                    this.chatWidget.style.display = 'none';
                    this.chatToggle.style.display = 'block';
                } else {this.chatWidget.style.display = 'flex';
                    this.chatToggle.style.display = 'none';
                    this.chatInput.focus();
                }
            }

            minimizeChat() {
                this.isMinimized = true;
                this.chatWidget.style.display = 'none';
                this.chatToggle.style.display = 'block';
            }

            generateSessionId() {
                return 'session_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            }

            async sendMessage() {
                const message = this.chatInput.value.trim();
                if (!message || this.isTyping) return;

                // Add user message
                this.addMessage(message, 'user');
                this.chatInput.value = '';
                this.sendBtn.disabled = true;

                // Show typing indicator
                this.showTyping();

                try {
                    // Try Rasa first
                    let response = await this.sendToRasa(message);
                    
                    if (!response) {
                        // Fallback to backend API
                        response = await this.sendToBackend(message);
                    }
                    
                    // Hide typing and add bot response
                    this.hideTyping();
                    this.addBotResponse(response || 'Sorry, I encountered an error.');
                    
                } catch (error) {
                    console.error('Chat error:', error);
                    this.hideTyping();
                    this.addMessage('Sorry, I\'m having trouble connecting. Please try again.', 'bot');
                }
            }

            async sendToRasa(message) {
                try {
                    const response = await fetch(this.rasaUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            sender: this.sessionId,
                            message: message
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        return data.length > 0 ? data[0].text : null;
                    }
                } catch (error) {
                    console.error('Rasa error:', error);
                }
                return null;
            }

            async sendToBackend(message) {
                try {
                    const response = await fetch(this.backendUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: message,
                            user_id: this.sessionId
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        return data.response;
                    }
                } catch (error) {
                    console.error('Backend error:', error);
                }
                return null;
            }

            addMessage(text, sender, buttons = null) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                messageDiv.textContent = text;
                
                // Add buttons if provided
                if (buttons && buttons.length > 0) {
                    const buttonsContainer = document.createElement('div');
                    buttonsContainer.className = 'message-buttons';
                    
                    buttons.forEach(button => {
                        const buttonElement = document.createElement('button');
                        buttonElement.className = 'message-button';
                        buttonElement.textContent = button.text;
                        buttonElement.onclick = () => {
                            this.handleButtonClick(button.value);
                        };
                        buttonsContainer.appendChild(buttonElement);
                    });
                    
                    messageDiv.appendChild(buttonsContainer);
                }
                
                this.chatMessages.appendChild(messageDiv);
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }

            handleButtonClick(value) {
                // Add the button text as user message
                this.addMessage(value, 'user');
                
                // Process the button value as if it was typed
                this.processButtonMessage(value);
            }

            async processButtonMessage(message) {
                // Show typing indicator
                this.showTyping();

                try {
                    // Try Rasa first
                    let response = await this.sendToRasa(message);
                    
                    if (!response) {
                        // Fallback to backend API
                        response = await this.sendToBackend(message);
                    }
                    
                    // Hide typing and add bot response
                    this.hideTyping();
                    this.addBotResponse(response || 'Sorry, I encountered an error.');
                    
                } catch (error) {
                    console.error('Chat error:', error);
                    this.hideTyping();
                    this.addMessage('Sorry, I\'m having trouble connecting. Please try again.', 'bot');
                }
            }

            addBotResponse(text) {
                // Check if this is a menu response and add buttons
                if (text.includes('🚗 **Latest COE Prices**') || text.includes('I can help with:')) {
                    const buttons = [
                        { text: '🚗 Latest COE Prices', value: 'coe prices' },
                        { text: '💰 Vehicle Costs', value: 'pricing' },
                        { text: '📋 Registration Help', value: 'registration' },
                        { text: '🔧 Maintenance Tips', value: 'maintenance' }
                    ];
                    this.addMessage(text, 'bot', buttons);
                } else {
                    this.addMessage(text, 'bot');
                }
            }

            showTyping() {
                this.isTyping = true;
                this.typingIndicator.style.display = 'block';
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }

            hideTyping() {
                this.isTyping = false;
                this.typingIndicator.style.display = 'none';
            }
        }

        // Initialize chat widget when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new CleverCompanionWidget();
        });

        // Expose global function for embedding
        window.initCleverCompanion = function(config = {}) {
            const widget = new CleverCompanionWidget();
            if (config.rasaUrl) {
                widget.rasaUrl = config.rasaUrl;
            }
            if (config.backendUrl) {
                widget.backendUrl = config.backendUrl;
            }
            return widget;
        };
    </script>
</body>
</html>
